name: Polaris Scan SAST


on:
  push:
    branches:
      - Polaris-testing
  workflow_dispatch:

jobs:
  polaris:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------
      # Checkout source code
      # --------------------------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Setup Java (recommended LTS version)
      # --------------------------------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # --------------------------------------------------
      # Verify Maven installation
      # --------------------------------------------------
      - name: Verify Maven
        run: mvn -version

      # --------------------------------------------------
      # Download Black Duck Bridge CLI
      # --------------------------------------------------
      - name: Download Bridge CLI
        run: |
          curl -fLsS -o bridge.zip \
            https://repo.blackduck.com/bds-integrations-release/com/blackduck/integration/bridge/binaries/bridge-cli-bundle/latest/bridge-cli-bundle-linux64.zip
          unzip -q bridge.zip
          chmod +x bridge-cli-bundle-linux64/bridge-cli

      # --------------------------------------------------
      # Run Polaris SAST Scan
      # --------------------------------------------------
      - name: Run Polaris SAST
        env:
          POLARIS_SERVER_URL: ${{ vars.POLARIS_SERVER_URL }}
          POLARIS_ACCESS_TOKEN: ${{ secrets.POLARIS_ACCESS_TOKEN }}
        run: |
          ./bridge-cli-bundle-linux64/bridge-cli \
            --stage polaris \
            polaris.serverUrl=$POLARIS_SERVER_URL \
            polaris.accessToken=$POLARIS_ACCESS_TOKEN \
            polaris.application.name=Nirmal_SCM \
            polaris.project.name=WebGoat \
            polaris.branch.name= Polaris-testing \
            polaris.assessment.types=SAST \
            polaris.waitForScan=true \
            coverity.build.command="mvn clean install -DskipTests"
